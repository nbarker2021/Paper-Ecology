  use: 'Creates a concrete comparator: LCR condensed-matter claims should be tested
    against fractional Fermi sea occupancy, Friedel oscillations, generalized hydrodynamics,
    and TLL-incompatibility claims.'
  boundary: Failure to match those external signatures is a falsifier or narrowing
    condition for relevant LCR material claims.
- source: EXT-RQM-CONSISTENT-2026
  lane: falsifier_or_open_obligation
  use: 'Creates a representation-equivalence comparator: LCR relabeling claims must
    specify the postulates and adapters under which predictions are preserved.'
  boundary: A relabeling without an equivalence proof remains only notation.
