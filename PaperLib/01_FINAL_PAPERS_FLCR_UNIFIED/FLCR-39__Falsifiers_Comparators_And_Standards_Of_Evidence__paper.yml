claim_binding_queue:
  queue_count: 3
  queues:
    - id: "finite_ca_bounded_search"
      title: "Finite CA And Bounded Search Promotion"
      lane: "receipt_bound_internal_result"
      promote_now: "Promote finite-state, bounded-search, local-rule, and exhaustive verification claims when the state space and transition law are explicit."
      bind_next: "Attach state-space size, transition law, verifier name, receipt path, and bounded domain statement."
      residue: "Unbounded Rule 30 prediction, global minimality, and all-game/all-system claims remain separate."
    - id: "formal_methods_receipt_closure"
      title: "Formal-Methods Receipt And Governance Closure"
      lane: "normal_form_result"
      promote_now: "Promote claim-envelope, receipt, lane, causal-graph, and conformance obligations as formal-methods artifacts when standards reports are attached."
      bind_next: "Attach NSIT standards report, content-addressed receipt, lane grant, replay path, and dependency graph row."
      residue: "Missing hashes, missing schemas, or unrun adapters remain engineering residues, not mathematical openness."
    - id: "negative_receipts_as_guards"
      title: "Negative And Failed-Route Receipts As Guards"
      lane: "falsifier_or_open_obligation"
      promote_now: "Use failed routes, rejected candidates, and boundary receipts as exclusion evidence and counterexample guards."
      bind_next: "Attach negative receipt path, rejected candidate, failure mode, and the promotion it blocks."
      residue: "A negative receipt constrains the claim; it does not prove the positive replacement unless separately evidenced."

claim_delta_ledger:
  delta_count: 3
  deltas:
    - id: "finite_ca_bounded_search"
      title: "Finite Ca Bounded Search"
      local_claim: "This paper may describe finite CA, search, game, or local-rule behavior within the bounded surface it actually enumerates."
      later_evidence: "Verifier state-space count, transition law, exhaustive/bounded receipt, and negative/minimality guards."
      revised_claim: "Promote finite-state and bounded-search claims when the state space and transition law are explicit."
      boundary: "Unbounded prediction, global minimality, all-game coverage, and all-system generalization remain separate."
      workbook_replay: "Record state-space size, transition law, receipt, coverage limit, and non-promoted unbounded claim."
    - id: "formal_methods_receipt_closure"
      title: "Formal Methods Receipt Closure"
      local_claim: "This paper may treat receipts, claim lanes, dependency graphs, and replay contracts as formal objects, not mere editorial apparatus."
      later_evidence: "NSIT standards, claim envelopes, content-addressed receipts, lane grants, Kimi 192/192 conformance, and graph/replay artifacts."
      revised_claim: "Promote form, receipt, lane, and governance obligations to formal-methods closures when the standard report or artifact is attached."
      boundary: "Missing hashes, schemas, adapters, or replay runs remain engineering residues rather than mathematical disproof."
      workbook_replay: "Attach envelope, receipt, lane grant, replay path, and dependency row for each governed claim."
    - id: "negative_receipts_as_guards"
      title: "Negative Receipts As Guards"
      local_claim: "This paper may preserve failed routes and rejected candidates as meaningful boundary data."
      later_evidence: "Negative receipts, failed verifier rows, rejected-as-datum outputs, and obligation ledgers."
