summary: 'Caps the first forty papers as a reconstruction map: prior receipts remain
  in prior papers, while FLCR-40 routes a skeptical reader through proof locations,
  analog reconstructions, code/tool solvers, blockers, and the handoff into FLCR-41..80.'
map_role:
  type: trust_removal_reconstruction_map
  receipt_policy: FLCR-40 routes to receipts in prior papers; it does not duplicate
    every receipt.
  reader_protocol:
  - ignore FLCR terminology initially
  - locate the prior formal object
  - reconstruct the object with the analog toolkit
  - inspect or run the corresponding code/tool solver
  - decide whether the mapped transition holds
  handoff: FLCR-41..80 redefine Standard Model and physics domains around the observer/readout
    framework.
