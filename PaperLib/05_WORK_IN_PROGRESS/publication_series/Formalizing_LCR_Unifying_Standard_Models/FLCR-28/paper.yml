normal_form_gate:
  required_for_finalization: false
  status: incoming_kimi_universal_normal_form_reserved
lattice_forge_actionization:
  enabled: true
  actionization_contract: Forge systems are the operational expression layer for the
    corpus. CAM stores addressable memory, labels, receipts, and obligations; lattice-forge
    actionizes that memory into lookup contracts, executable methods, receipt rows,
    events, and reusable cached answers.
  leech_lookup_surface_allowed: true
  canonical_apis:
  - Forge.leech_lookup(address=0, payload=None)
  - Forge.verify_leech_lookup()
  - lattice_forge.lattice_codes.verify_lattice_code_chain
  - lattice_forge.lattice_codes.verify_golay_24
  - lattice_forge.enumerated_glue.derive_classical_leech_minimal_landing
  - lattice_forge.enumerated_glue.encode_leech_ribbon
standards_review:
  nist_adapter_report: FLCR_NIST_AND_REVIEW_SUITE_REPORT.json
  baseline_canonical_report: NIST_CANONICAL_32_BASELINE_REPORT.json
  receipt_policy: Suite-level review reports are manifest-bound review receipts. They
    do not replace paper-local mathematical receipts, external citations, calibration
    rows, or CAM/tool runs.
  last_applied: '2026-06-29T18:41:58.662958+00:00'
external_review_lanes:
- lane_id: mannyai_cam_crystal_mcp
  claim_lane: cam_crystal_reapplication_result
  source_root: D:\MannyAI
  use: Treats CAM/crystal operations and MCP tools as addressable runtime evidence
    for lookup, crystal projection, content-addressed writes, and carrier-CEM execution.
  boundary: Runtime/MCP conformance is a review lane and tool route; it does not replace
    mathematical proof or physical calibration.
- lane_id: mannyai_splatforge_field_runtime
  claim_lane: cam_crystal_reapplication_result
  source_root: D:\MannyAI
  use: Adds the spatial/field forge as the bridge between crystals, grammar dispatch,
    deterministic render/readout, LCR ring controls, and reconstruction.
  boundary: Useful as executable/adapter evidence; domain claims still need per-domain
    data, receipts, or calibrators.
- lane_id: mannyai_carrier_cem_and_research_receipts
  claim_lane: receipt_bound_internal_result
  source_root: D:\MannyAI
  use: Adds carrier-CEM, grant enforcement, learner/specialization, sealed receipt
    chains, and research receipts as direct review-lane sources.
  boundary: Cold-start accuracy and domain dispatch remain bounded by the manifest's
    open obligations unless closed by tests.
- lane_id: docker_standards_suite
  claim_lane: normal_form_result
  source_root: D:\DockerContainers\Manny Docker Starter
  use: Treats the Docker-hosted MannyAI standards stack as a first-class review lane
    for structure, claim coverage, receipt status, open obligations, obligation continuity,
    and suite-aware evidence.
  boundary: Standards passing proves conformance to the review protocol, not truth
    of every imported claim.
- lane_id: docker_window_node_databases
  claim_lane: cam_crystal_reapplication_result
  source_root: D:\DockerContainers\Manny Docker Starter
  use: Adds the 2/4/8/16/32 window hierarchy, node DBs, paper manifests, and central
    MannyAI DB as review-lane memory surfaces.
  boundary: Databases are intake/query sources; individual rows must be quoted or
    receipted before being promoted.
- lane_id: docker_mcp_and_deployment_surface
  claim_lane: receipt_bound_internal_result
  source_root: D:\DockerContainers\Manny Docker Starter
  use: Adds Docker/MCP deployment, container topology, normalized compose, running-container
    snapshots, and ReForge integration as operational review lanes.
  boundary: Deployment topology is infrastructure evidence; services should not be
    assumed live unless current health checks are run.
- lane_id: docker_observability_security_governance
  claim_lane: falsifier_or_open_obligation
  source_root: D:\DockerContainers\Manny Docker Starter
  use: Adds operational guardrails, monitoring, deployment policy, Kubernetes/Helm
    surfaces, and security documentation as automation-review guardrails.
  boundary: Security/deployment docs are guardrails and falsifier lanes for automation,
    not restrictions on human hypothesis generation.

